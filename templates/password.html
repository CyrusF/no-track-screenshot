<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问验证 - Screenshot to HTML</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="center-card">
        <h1>访问验证</h1>
        <p class="subtitle">请输入密码查看此页面</p>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="POST" action="/task/{{.TaskID}}/auth">
            <input type="password" name="password" placeholder="全局密码或一次性密码" required autofocus>
            <button type="submit">验证</button>
        </form>
    </div>
</body>
</html>
