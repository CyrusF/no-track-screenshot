<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务 {{.Task.ID}} - Screenshot to HTML</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 顶部悬浮导航条 */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: rgba(30, 30, 30, 0.82);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 99999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            color: rgba(255,255,255,0.85);
        }

        .topbar-left a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .topbar-left a:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
        }
        .topbar-right img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 内容区留出顶部导航条高度 */
        body {
            padding-top: 40px;
        }

        .html-content {
            width: 100%;
            min-height: calc(100vh - 40px);
        }

        /* 等待/错误状态 */
        .status-overlay {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            z-index: 10000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .status-box {
            text-align: center;
            color: #555;
        }
        .status-box h2 {
            margin-bottom: 12px;
            font-weight: 500;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-text { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/">← 返回上传</a>
        </div>
        <div class="topbar-right">
            <span>当前任务</span>
            <img src="/task/{{.Task.ID}}/preview" alt="preview" title="原始截图预览">
        </div>
    </div>

    {{if eq (printf "%s" .Task.Status) "done"}}
        <div class="html-content">{{.TaskHTML}}</div>
    {{else if eq (printf "%s" .Task.Status) "failed"}}
        <div class="status-overlay">
            <div class="status-box">
                <h2 class="error-text">生成失败</h2>
                <p>{{.Task.Error}}</p>
            </div>
        </div>
    {{else}}
        <div class="status-overlay" id="statusOverlay">
            <div class="status-box">
                <div class="spinner"></div>
                <h2>正在生成中...</h2>
                <p id="statusText">AI 正在分析截图并生成 HTML</p>
            </div>
        </div>
        <script>
            (function() {
                const taskId = "{{.Task.ID}}";
                function poll() {
                    fetch("/task/" + taskId + "/status")
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === "done") {
                                location.reload();
                            } else if (data.status === "failed") {
                                document.getElementById("statusText").textContent = "错误: " + data.error;
                                document.getElementById("statusText").classList.add("error-text");
                            } else {
                                setTimeout(poll, 2000);
                            }
                        })
                        .catch(() => setTimeout(poll, 3000));
                }
                setTimeout(poll, 2000);
            })();
        </script>
    {{end}}
</body>
</html>
