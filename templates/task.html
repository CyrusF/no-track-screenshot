<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务 {{.Task.ID}} - Screenshot to HTML</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 顶部悬浮导航条 */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 14px;
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            z-index: 99999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            color: rgba(255,255,255,0.75);
        }

        .topbar-left a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }
        .topbar-left a:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .topbar-center {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .topbar-right img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* 内容区留出顶部导航条高度 */
        body {
            padding-top: 44px;
        }

        .html-content {
            width: 100%;
            min-height: calc(100vh - 44px);
        }

        /* 手机：标题换行到第二行 */
        @media (max-width: 480px) {
            .topbar {
                height: auto;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
                padding: 6px 10px;
                gap: 4px 0;
            }
            .topbar-left  { grid-column: 1; grid-row: 1; }
            .topbar-right { grid-column: 2; grid-row: 1; }
            .topbar-center {
                grid-column: 1 / -1;
                grid-row: 2;
                font-size: 12px;
                padding-bottom: 4px;
            }
            body { padding-top: 72px; }
            .html-content { min-height: calc(100vh - 72px); }
            .status-overlay { top: 72px; }
        }

        /* 等待/错误状态 */
        .status-overlay {
            position: fixed;
            top: 40px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            z-index: 10000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .status-box {
            text-align: center;
            color: #555;
        }
        .status-box h2 {
            margin-bottom: 12px;
            font-weight: 500;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-text { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/">← 返回</a>
        </div>
        <div class="topbar-center">no-track-screenshot</div>
        <div class="topbar-right">
            <span>当前任务</span>
            <img src="/task/{{.Task.ID}}/preview" alt="preview" title="原始截图预览">
        </div>
    </div>

    {{if eq (printf "%s" .Task.Status) "done"}}
        <div class="html-content">{{.TaskHTML}}</div>
    {{else if eq (printf "%s" .Task.Status) "failed"}}
        <div class="status-overlay">
            <div class="status-box">
                <h2 class="error-text">生成失败</h2>
                <p>{{.Task.Error}}</p>
            </div>
        </div>
    {{else}}
        <div class="status-overlay" id="statusOverlay">
            <div class="status-box">
                <div class="spinner"></div>
                <h2>正在生成中...</h2>
                <p id="statusText">AI 正在分析截图并生成 HTML</p>
            </div>
        </div>
        <script>
            (function() {
                const taskId = "{{.Task.ID}}";
                function poll() {
                    fetch("/task/" + taskId + "/status")
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === "done") {
                                location.reload();
                            } else if (data.status === "failed") {
                                document.getElementById("statusText").textContent = "错误: " + data.error;
                                document.getElementById("statusText").classList.add("error-text");
                            } else {
                                setTimeout(poll, 2000);
                            }
                        })
                        .catch(() => setTimeout(poll, 3000));
                }
                setTimeout(poll, 2000);
            })();
        </script>
    {{end}}
</body>
</html>
